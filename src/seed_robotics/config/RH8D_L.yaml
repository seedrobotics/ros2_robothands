# ROS 2 parameter file for the RH8D Right Hand controller.
# The top-level key must match the node name declared in hand_handle_node.py.
hand_handle_node:
  ros__parameters:
    baudrate: 1000000
    port: "/dev/ttyUSB0"
    frequency: 50
    light_mode: false
    prefix: "L_"
    joint_mapping: 
      l_main_board: 40
      l_w_rotation: 41
      l_w_adduction: 42
      l_w_flexion: 43
      l_th_adduction: 44
      l_th_flexion: 45
      l_ix_flexion: 46
      l_middle_flexion: 47
      l_ring_ltl_flexion: 48

